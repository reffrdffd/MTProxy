name: CI/CD📦

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COSIGN_VERSION: "3.0.4"
  BUILDX_VERSION: "0.31.1"
  BUILDKIT_VERSION: "0.27.1"
  MINT_VERSION: "1.41.8"
  DIVE_VERSION: "0.13.1"
  GRYPE_VERSION: "0.108.0"
  SYFT_VERSION: "1.42.0"
  DOCKER_BUILDKIT: 1
  # BUILDKIT_PROGRESS: quiet
  BUILDKIT_PROGRESS: plain

jobs:
  build:
    if: github.actor == 'ammnt'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout repository📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # - name: Load .env variables☁️
